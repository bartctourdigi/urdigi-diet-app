<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a237e">
<title>UrDigi 飲食紀錄</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --primary: #1a237e; --accent: #ff6d00; --bg: #f5f5f5; --card: #fff; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: var(--bg); color: #333; min-height: 100vh; }

header { background: var(--primary); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
header .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
header .logo span { color: var(--accent); }
header .subtitle { font-size: 12px; opacity: .8; }

nav { display: flex; background: #fff; border-bottom: 1px solid #e0e0e0; }
nav button { flex: 1; padding: 10px 4px; border: none; background: none; font-size: 12px; color: #888; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
nav button.active { color: var(--primary); border-bottom-color: var(--accent); font-weight: 600; }

main { padding: 16px; max-width: 480px; margin: 0 auto; }

.card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.card h3 { font-size: 14px; color: var(--primary); font-weight: 700; margin-bottom: 12px; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 10px; border: none; font-size: 14px; cursor: pointer; font-weight: 600; transition: all .2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-accent { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
.btn:active { transform: scale(.96); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

#camera-area { text-align: center; }
#preview-img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; display: none; margin-bottom: 12px; }
#file-input { display: none; }

.result-box { background: #e8f5e9; border-radius: 12px; padding: 14px; margin-top: 12px; display: none; }
.result-box .food-name { font-size: 18px; font-weight: 700; color: #1b5e20; }
.result-box .kcal { font-size: 28px; font-weight: 900; color: var(--accent); }
.nutrients { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 8px; }
.nutrient { text-align: center; background: #fff; border-radius: 8px; padding: 8px; }
.nutrient .val { font-size: 16px; font-weight: 700; color: var(--primary); }
.nutrient .lbl { font-size: 11px; color: #888; }

.api-key-box { background: #fff3e0; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
.api-key-box input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; margin-top: 6px; }
.api-key-box .hint { font-size: 11px; color: #888; margin-top: 4px; }

.log-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; gap: 10px; }
.log-item:last-child { border-bottom: none; }
.log-item .emoji { font-size: 24px; }
.log-item .info { flex: 1; }
.log-item .info .name { font-weight: 600; font-size: 14px; }
.log-item .info .meta { font-size: 12px; color: #888; }
.log-item .kcal { font-weight: 700; color: var(--accent); font-size: 16px; }
.log-item .del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; }

.summary-row { display: flex; justify-content: space-around; text-align: center; margin-bottom: 16px; }
.summary-row .val { font-size: 24px; font-weight: 900; color: var(--primary); }
.summary-row .lbl { font-size: 11px; color: #888; }

.weight-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.weight-row input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }

#tab-log, #tab-stats, #tab-weight { display: none; }
#tab-log.active, #tab-stats.active, #tab-weight.active { display: block; }
#tab-home { display: block; }
#tab-home.hidden { display: none; }

.loading { text-align: center; padding: 20px; color: #888; }
.loading .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 32px 16px; color: #aaa; }
.empty .icon { font-size: 48px; margin-bottom: 8px; }

.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Ur<span>Digi</span></div>
    <div class="subtitle">AI 飲食紀錄</div>
  </div>
</header>

<nav>
  <button class="active" onclick="showTab('home')">🏠 記錄</button>
  <button onclick="showTab('log')">📋 歷史</button>
  <button onclick="showTab('stats')">📊 統計</button>
  <button onclick="showTab('weight')">⚖️ 體重</button>
</nav>

<main>
  <!-- HOME TAB -->
  <div id="tab-home">
    <div class="card api-key-box" id="api-key-card">
      <b>🔑 設定 Gemini API Key</b>
      <input type="password" id="api-key-input" placeholder="輸入您的 Gemini API Key">
      <div class="hint">免費申請：<a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></div>
      <button class="btn btn-primary" style="margin-top:8px;width:100%" onclick="saveApiKey()">儲存</button>
    </div>

    <div class="card" id="camera-area">
      <h3>📷 拍照辨識食物</h3>
      <img id="preview-img" alt="預覽">
      <div class="btn-row" style="justify-content:center;margin-bottom:8px">
        <button class="btn btn-primary" onclick="document.getElementById('camera-input').click()">📷 拍照</button>
        <button class="btn btn-outline" onclick="document.getElementById('file-input').click()">🖼 上傳圖片</button>
      </div>
      <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleImage(event)">
      <input type="file" id="file-input" accept="image/*" onchange="handleImage(event)">

      <div id="loading-box" class="loading" style="display:none">
        <div class="spinner"></div>
        AI 辨識中，請稍候...
      </div>

      <div class="result-box" id="result-box">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span id="result-emoji" style="font-size:32px">🍽</span>
          <div>
            <div class="food-name" id="result-name">—</div>
            <div class="kcal"><span id="result-kcal">0</span> kcal</div>
          </div>
        </div>
        <div class="nutrients">
          <div class="nutrient"><div class="val" id="r-protein">0</div><div class="lbl">蛋白質 g</div></div>
          <div class="nutrient"><div class="val" id="r-carb">0</div><div class="lbl">碳水 g</div></div>
          <div class="nutrient"><div class="val" id="r-fat">0</div><div class="lbl">脂肪 g</div></div>
        </div>
        <button class="btn btn-accent" style="width:100%;margin-top:12px" onclick="addToLog()">✅ 加入紀錄</button>
      </div>
    </div>

    <div class="card">
      <h3>📝 手動輸入</h3>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input type="text" id="manual-name" placeholder="食物名稱（例：滷肉飯）" style="padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px">
        <input type="number" id="manual-kcal" placeholder="熱量（kcal）" style="padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px">
        <div style="display:flex;gap:8px">
          <input type="number" id="manual-protein" placeholder="蛋白質g" style="padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;flex:1">
          <input type="number" id="manual-carb" placeholder="碳水g" style="padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;flex:1">
          <input type="number" id="manual-fat" placeholder="脂肪g" style="padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;flex:1">
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="addManual()">➕ 新增</button>
      </div>
    </div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" class="page">
    <div class="card">
      <h3>📋 今日飲食紀錄</h3>
      <div id="today-summary" class="summary-row"></div>
      <div id="log-list"></div>
    </div>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" class="page">
    <div class="card">
      <h3>📊 今日營養分析</h3>
      <canvas id="nutrient-chart" height="200"></canvas>
    </div>
    <div class="card">
      <h3>📅 近七日熱量趨勢</h3>
      <canvas id="kcal-chart" height="180"></canvas>
    </div>
  </div>

  <!-- WEIGHT TAB -->
  <div id="tab-weight" class="page">
    <div class="card">
      <h3>⚖️ 體重記錄</h3>
      <div class="weight-row">
        <input type="number" id="weight-input" placeholder="今日體重 (kg)" step="0.1">
        <button class="btn btn-accent" onclick="addWeight()">記錄</button>
      </div>
      <canvas id="weight-chart" height="200"></canvas>
    </div>
  </div>
</main>

<script>
// ── State ──────────────────────────────────────────────────
let currentImage = null;
let currentResult = null;
let nutrientChart = null;
let kcalChart = null;
let weightChart = null;

// ── Init ───────────────────────────────────────────────────
window.onload = () => {
  // ⚠️ API Key 請在下方 UI 輸入框填入，不要硬編碼在程式碼中
  // if (!localStorage.getItem('gemini_api_key')) { localStorage.setItem('gemini_api_key', 'YOUR_GEMINI_API_KEY'); }
  const key = localStorage.getItem('gemini_api_key');
  if (key) document.getElementById('api-key-card').style.display = 'none';
  renderLog();
};

// ── Tab navigation ─────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('nav button').forEach((b,i) => {
    b.classList.toggle('active', ['home','log','stats','weight'][i] === tab);
  });
  document.getElementById('tab-home').style.display = tab === 'home' ? 'block' : 'none';
  ['log','stats','weight'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none';
  });
  if (tab === 'log') renderLog();
  if (tab === 'stats') renderStats();
  if (tab === 'weight') renderWeight();
}

// ── API Key ────────────────────────────────────────────────
function saveApiKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) { alert('請輸入 API Key'); return; }
  localStorage.setItem('gemini_api_key', k);
  document.getElementById('api-key-card').style.display = 'none';
  alert('✅ API Key 已儲存！');
}

// ── Image handling ─────────────────────────────────────────
function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('preview-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    currentImage = ev.target.result.split(',')[1];
    document.getElementById('result-box').style.display = 'none';
    analyzeFood();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

async function analyzeFood() {
  const key = localStorage.getItem('gemini_api_key');
  if (!key) {
    document.getElementById('api-key-card').style.display = 'block';
    alert('請先設定 Gemini API Key');
    return;
  }
  document.getElementById('loading-box').style.display = 'block';
  document.getElementById('result-box').style.display = 'none';

  const prompt = `你是專業營養師。請分析這張食物照片，用繁體中文JSON格式回答：
{"name":"食物名稱","emoji":"適合的emoji","kcal":數字,"protein":蛋白質g數字,"carb":碳水g數字,"fat":脂肪g數字}
只輸出JSON，不要其他文字。估算一般份量的數值。`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { text: prompt },
          { inline_data: { mime_type: 'image/jpeg', data: currentImage } }
        ]}]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.candidates[0].content.parts[0].text.trim();
    const json = JSON.parse(text.replace(/```json|```/g,'').trim());
    currentResult = json;
    showResult(json);
  } catch(err) {
    alert('辨識失敗：' + err.message + '\n\n請確認 API Key 正確，或改用手動輸入。');
  } finally {
    document.getElementById('loading-box').style.display = 'none';
  }
}

function showResult(r) {
  document.getElementById('result-name').textContent = r.name;
  document.getElementById('result-emoji').textContent = r.emoji || '🍽';
  document.getElementById('result-kcal').textContent = r.kcal;
  document.getElementById('r-protein').textContent = r.protein;
  document.getElementById('r-carb').textContent = r.carb;
  document.getElementById('r-fat').textContent = r.fat;
  document.getElementById('result-box').style.display = 'block';
}

// ── Log ────────────────────────────────────────────────────
function getLog() { return JSON.parse(localStorage.getItem('diet_log') || '[]'); }
function saveLog(log) { localStorage.setItem('diet_log', JSON.stringify(log)); }

function addToLog() {
  if (!currentResult) return;
  const log = getLog();
  log.unshift({ ...currentResult, time: new Date().toISOString(), id: Date.now() });
  saveLog(log);
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('preview-img').style.display = 'none';
  currentResult = null;
  alert('✅ 已加入今日紀錄！');
}

function addManual() {
  const name = document.getElementById('manual-name').value.trim();
  const kcal = parseInt(document.getElementById('manual-kcal').value) || 0;
  if (!name) { alert('請輸入食物名稱'); return; }
  const log = getLog();
  log.unshift({
    name, kcal,
    protein: parseFloat(document.getElementById('manual-protein').value) || 0,
    carb: parseFloat(document.getElementById('manual-carb').value) || 0,
    fat: parseFloat(document.getElementById('manual-fat').value) || 0,
    emoji: '📝', time: new Date().toISOString(), id: Date.now()
  });
  saveLog(log);
  ['manual-name','manual-kcal','manual-protein','manual-carb','manual-fat'].forEach(id => document.getElementById(id).value = '');
  alert('✅ 已新增！');
}

function delLog(id) {
  if (!confirm('確定刪除？')) return;
  saveLog(getLog().filter(i => i.id !== id));
  renderLog();
}

function renderLog() {
  const today = new Date().toDateString();
  const items = getLog().filter(i => new Date(i.time).toDateString() === today);
  const total = items.reduce((a,i) => ({ kcal: a.kcal+i.kcal, protein: a.protein+i.protein, carb: a.carb+i.carb, fat: a.fat+i.fat }), { kcal:0, protein:0, carb:0, fat:0 });

  document.getElementById('today-summary').innerHTML = `
    <div><div class="val">${total.kcal}</div><div class="lbl">總熱量 kcal</div></div>
    <div><div class="val">${total.protein.toFixed(1)}</div><div class="lbl">蛋白質 g</div></div>
    <div><div class="val">${total.carb.toFixed(1)}</div><div class="lbl">碳水 g</div></div>
    <div><div class="val">${total.fat.toFixed(1)}</div><div class="lbl">脂肪 g</div></div>
  `;

  const list = document.getElementById('log-list');
  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">🍽</div><div>今日尚未記錄任何飲食</div></div>';
    return;
  }
  list.innerHTML = items.map(i => `
    <div class="log-item">
      <div class="emoji">${i.emoji || '🍽'}</div>
      <div class="info">
        <div class="name">${i.name}</div>
        <div class="meta">${new Date(i.time).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})} | P:${i.protein}g C:${i.carb}g F:${i.fat}g</div>
      </div>
      <div class="kcal">${i.kcal}</div>
      <button class="del" onclick="delLog(${i.id})">✕</button>
    </div>
  `).join('');
}

// ── Stats ──────────────────────────────────────────────────
function renderStats() {
  const today = new Date().toDateString();
  const items = getLog().filter(i => new Date(i.time).toDateString() === today);
  const total = items.reduce((a,i) => ({ protein: a.protein+i.protein, carb: a.carb+i.carb, fat: a.fat+i.fat }), { protein:0, carb:0, fat:0 });

  if (nutrientChart) nutrientChart.destroy();
  nutrientChart = new Chart(document.getElementById('nutrient-chart'), {
    type: 'doughnut',
    data: {
      labels: ['蛋白質', '碳水化合物', '脂肪'],
      datasets: [{ data: [total.protein, total.carb, total.fat], backgroundColor: ['#1a237e','#ff6d00','#43a047'], borderWidth: 0 }]
    },
    options: { plugins: { legend: { position: 'bottom' } }, cutout: '60%' }
  });

  // 7 day kcal
  const days = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-6+i);
    return { label: `${d.getMonth()+1}/${d.getDate()}`, date: d.toDateString() };
  });
  const kcalData = days.map(d => getLog().filter(i => new Date(i.time).toDateString() === d.date).reduce((a,i) => a+i.kcal, 0));

  if (kcalChart) kcalChart.destroy();
  kcalChart = new Chart(document.getElementById('kcal-chart'), {
    type: 'bar',
    data: {
      labels: days.map(d => d.label),
      datasets: [{ label: 'kcal', data: kcalData, backgroundColor: '#1a237e', borderRadius: 6 }]
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
}

// ── Weight ─────────────────────────────────────────────────
function getWeights() { return JSON.parse(localStorage.getItem('weight_log') || '[]'); }

function addWeight() {
  const v = parseFloat(document.getElementById('weight-input').value);
  if (!v || v < 20 || v > 300) { alert('請輸入有效體重（20-300 kg）'); return; }
  const log = getWeights();
  const today = new Date().toDateString();
  const idx = log.findIndex(i => i.date === today);
  if (idx >= 0) log[idx].weight = v; else log.push({ date: today, weight: v, time: new Date().toISOString() });
  localStorage.setItem('weight_log', JSON.stringify(log));
  document.getElementById('weight-input').value = '';
  renderWeight();
}

function renderWeight() {
  const log = getWeights().slice(-30);
  if (weightChart) weightChart.destroy();
  weightChart = new Chart(document.getElementById('weight-chart'), {
    type: 'line',
    data: {
      labels: log.map(i => { const d = new Date(i.time); return `${d.getMonth()+1}/${d.getDate()}`; }),
      datasets: [{ label: '體重 kg', data: log.map(i => i.weight), borderColor: '#ff6d00', backgroundColor: 'rgba(255,109,0,.1)', tension: 0.4, fill: true, pointRadius: 4 }]
    },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
  });
}
</script>
</body>
</html>
